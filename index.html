<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bárbara Sánchez Barroso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-view="home">

    <main id="app">
        <!-- VISUALIZADOR (70%) -->
        <section id="viewer" aria-label="Visualizador">
            <div id="viewer-content"></div>
        </section>

        <!-- MENÚ (30%) -->
        <aside id="menu" aria-label="Menú principal">
            <div id="menu-center">
                <h1 id="site-title">bárbara sánchez<br>barroso</h1>

                <nav id="menu-sections">
                    <ul></ul>
                </nav>

                <nav id="menu-works" aria-label="Obras">
                    <h2 class="menu-heading" data-i18n="work" role="button" tabindex="0" aria-expanded="false">Work</h2>
                    <ol id="works-list"></ol>
                </nav>
            </div>

            <div id="lang-switch" role="group" aria-label="Idioma">
                <button class="lang-btn is-active" data-lang="es">es</button>
                <button class="lang-btn" data-lang="en">en</button>
                <button class="lang-btn" data-lang="ca">ca</button>
            </div>

            <button id="back-btn" type="button" aria-label="Back">← back</button>
        </aside>
    </main>

    <noscript>
        <p style="padding:2rem">Activa JavaScript para ver el contenido.</p>
    </noscript>

    <script type="module" src="js/main.js"></script>
</body>
</html>
