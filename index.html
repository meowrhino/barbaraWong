<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bárbara Sánchez Barroso</title>
    <link rel="icon" type="image/png" sizes="any" href="assets/favicon.png">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-view="news">

    <!-- WELCOME -->
    <div id="welcome" hidden>
        <video id="welcome-video-a" class="welcome-video is-current" muted playsinline preload="auto"></video>
        <video id="welcome-video-b" class="welcome-video" muted playsinline preload="metadata"></video>

        <div id="welcome-ui">
            <button id="enter-btn" type="button" aria-label="Entrar al sitio">
                <span>bárbara</span>
                <span>sánchez</span>
                <span>barroso</span>
            </button>
            <button id="audio-btn" type="button" aria-pressed="false" aria-label="Activar sonido">
                <span class="audio-icon" aria-hidden="true">♪</span>
                <span class="audio-text">sound off</span>
            </button>
        </div>
        <div id="welcome-thumbs" role="tablist" aria-label="Elegir vídeo de portada"></div>
    </div>

    <!-- SITE -->
    <main id="app" hidden>

        <aside id="nav" aria-label="Menú principal">
            <!-- TOP (móvil): nombre + categoría activa -->
            <div id="nav-top">
                <span id="nav-name">bárbara s. barroso</span>
                <span id="nav-active" aria-hidden="true"></span>
            </div>

            <!-- BODY: menú + lang -->
            <div id="nav-body">
                <nav id="menu-sections" aria-label="Secciones">
                    <ul></ul>
                </nav>
                <div id="lang-switch" role="group" aria-label="Idioma">
                    <button class="lang-btn is-active" data-lang="es">es</button>
                    <span class="lang-sep">/</span>
                    <button class="lang-btn" data-lang="en">en</button>
                    <span class="lang-sep">/</span>
                    <button class="lang-btn" data-lang="ca">cat</button>
                </div>
            </div>

            <!-- BOTTOM (móvil): toggle persiana -->
            <div id="nav-bottom">
                <button id="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-body">ver menú</button>
            </div>
        </aside>

        <section id="viewer" aria-label="Contenido">
            <a id="site-name" href="#news" aria-label="Inicio">bárbara s. barroso</a>
            <div id="viewer-content"></div>
        </section>
    </main>

    <noscript>
        <p style="padding:2rem">Activa JavaScript para ver el contenido.</p>
    </noscript>

    <script type="module" src="js/main.js"></script>
</body>
</html>
